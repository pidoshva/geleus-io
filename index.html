                    'в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Ҳв »вЎҶвўҖв Җв ҖвЈҝвЈ§вўӨв ӨвЈһвЈҝв Җв Җв ҖвЎ„в Җв ҖвЈ вЎҝв ғв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ\n' +
                    'в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҷвўһвЈ„в Җв ҷв ҝвЈјвЎ®в Ҫв ғв ҖвЈ в һв ҖвЈ вЎҝв Ӣв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ\n' +
                    'в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Ҳв ӣв ·вЈ¶вЈӮвЎҷв ҷв үвўүвЈүвЈҖвЎӨв һв үв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ\n' +
                    'в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Ҳв үв үв Ӣв үв үв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ\n' ;

    var all = [ 
        whois,
        social(),
        work,
        education,
        skills,
        softSkills,
        languages,
        projects,
        certifications,
        misc,
        
        
        
        source,
        
    ]

    $('body').terminal(function(command, term) {

        var useLess = false;
        

        function echoArray(array) {
            if (useLess) {
                term.less(array);
            } else {
                for (i = 0; i < array.length; i += 1) {
                    term.echo(array[i]);
                }
            }
        }
        
        function progress(percent, width) {
            var size = Math.round(width*percent/100);
            var left = '', taken = '', i;
            for (i=size; i--;) {
                taken += '=';
            }
            if (taken.length > 0) {
                taken = taken.replace(/=$/, '>');
            }
            for (i=width-size; i--;) {
                left += ' ';
            }
            return '[' + taken + left + '] ' + percent + '%';
        }

        function loading () {
            var i = 0, size = 30;
            prompt = term.get_prompt();
            string = progress(0, size);
            term.set_prompt(progress);
            animation = true;
            (function loop() {
                string = progress(i++, size);
                term.set_prompt(string);
                if (i < 100) {
                    timer = setTimeout(loop, 10);
                } else {
                    term.echo(progress(i, size) + ' [[b;green;]OK]').set_prompt(prompt);
                    animation = false
                }
            })();
        }

        commands = command.split(/[ ]+/);
        if (commands[0] == 'less') {
            useLess = true;
            commands.shift();
        } 
                    
        switch(commands[0]) {
            case 'whois':
                
                echoArray(whois);
                break;
            case 'social':
                
                echoArray(social());
                break;
            case 'work':
                
                echoArray(work);
                break;
            case 'education':
                
                echoArray(education);
                break;
            case 'skills':
                
                echoArray(skills);
                break;
            case 'softskills':
                
                echoArray(softSkills);
                break;
            case 'languages':
                
                echoArray(languages);
                break;
            case 'projects':
                
                echoArray(projects);
                break;
            case 'certifications':
                
                term.echo(certifications);
                break;
            case 'about':
                
                echoArray(misc);
                break;
            case 'help':
            case '?':
                term.echo(help);
                break;
            case 'all':
                
                echoArray(all.flat(1));
                break;
            
            case 'startx':
                term.echo("loading ...");
                loading();
                setTimeout(function(){window.location = "https:\/\/geleus.com\/"}, 2000);
                break;
            
            case ':(){:|:&};:':
                term.echo("nice try");
                break;
            case 'source':
                
                term.echo(source);
                break;
            
            case 'exit':
                term.echo("terminating ... ")
                loading();
                setTimeout(function(){window.location = 'about:blank'}, 2000);
                break;
            
            
            case 'version':
                term.echo("1.0.0 (BETA)");
                break;
            
            case '':
                break;
            default:
                term.echo("\nunknown command: " + command + "\n" +
                          "please type 'help' or '?' for a list of available commands\n");
        }
    }, {
        prompt: '[[;red;][][[;green;]guest@geleus.io][[;red;]\\]][[;grey;]-][[;red;][][[;gold;]~\/resume][[;red;]\\]][[;orange;]: ]',
        greetings: "[[b;white;]вҖҺ\nв–Ҳв–‘в–ҲвҖғв–„в–Җв–ҲвҖғв–Ҳв–Җв–„вҖғв–ҲвҖғв–Ҳв–Җв–„в–Җв–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–ҖвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–‘в–ҲвҖғв–„в–Җв–Ҳ  BETA\nв–Җв–„в–ҖвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–‘в–ҲвҖғ вҖғв–Ҳв–Җв–ҖвҖғв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–„в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Җв–„в–ҖвҖғв–Ҳв–Җв–Ҳ                                                                                                                                                                                               \n\nWelcome to Vadim\u0027s interactive resume!\n\nType \u0027help\u0027 for a list of available commands\n]",

        keydown: function(e, term) {
            if (animation) {
                if (e.which == 68 && e.ctrlKey) { 
                    clearTimeout(timer);
                    animation = false;
                    term.echo(string + ' [[b;red;]FAIL]')
                    .set_prompt(prompt);
                }
                return false;
            }
        },
        autocompleteMenu: true,
        completion: Object.keys(commands)
        
    });
});
</script>

        </body>
